amcl:
  ros__parameters:
    use_sim_time: False
    update_min_d: 0.1       # THÊM MỚI: Cập nhật vị trí mỗi khi nhích 10cm (Cũ là 0.25)
    update_min_a: 0.05      # THÊM MỚI: Cập nhật vị trí mỗi khi xoay 2.8 độ (Cũ là 0.2)
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    scan_topic: scan_filtered

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
      
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # --- BỘ NÃO MPPI (Thay thế hoàn toàn DWB) ---
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56                   # Nhìn trước 56 bước
      model_dt: 0.05                   # Mỗi bước 0.05s -> Tầm nhìn 2.8 giây tương lai
      batch_size: 2000                 # Orin Nano gánh 2000 quỹ đạo quá dễ dàng
      vx_std: 0.2
      vy_std: 0.0
      wz_std: 0.8
      vx_max: 0.5                      # Tốc độ tiến tối đa 0.5 m/s
      vx_min: -0.1                     # Cho phép lùi nhẹ để gỡ kẹt
      wz_max: 0.6                      # Vận tốc xoay tối đa
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize_trajectories: True     # Hiện đuôi sao chổi trên RViz
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - PreferForwardCritic
      ConstraintCritic:
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        cost_power: 1
        cost_weight: 1.5 #3.81
      GoalCritic:
        cost_power: 1
        cost_weight: 10.0 #5.0
        threshold_to_keep: 2.0
      PathAlignCritic:
        cost_power: 1
        cost_weight: 18.0 #30.0
      PathFollowCritic:
        cost_power: 1
        cost_weight: 20.0 #20.0
      PathAngleCritic:
        cost_power: 1
        cost_weight: 2.0  
      PreferForwardCritic:
        cost_power: 1
        cost_weight: 40.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      transform_tolerance: 1.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      # Khai báo tọa độ thực của xe (x, y) - Xóa robot_radius
      footprint: "[ [0.225, 0.175], [0.225, -0.175], [-0.225, -0.175], [-0.225, 0.175] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.4
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          obstacle_max_range: 8.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      transform_tolerance: 1.0
      resolution: 0.05
      footprint: "[ [0.225, 0.175], [0.225, -0.175], [-0.225, -0.175], [-0.225, 0.175] ]"
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          obstacle_max_range: 8.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.55

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    use_sim_time: False
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]
    min_velocity: [-0.1, 0.0, -1.0]
    max_accel: [0.5, 0.0, 1.5]
    max_decel: [-0.6, 0.0, -1.5]
    odom_topic: "odom"
    odom_duration: 0.1

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200