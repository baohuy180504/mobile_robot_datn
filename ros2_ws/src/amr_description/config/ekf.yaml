ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    
    # Các khung tọa độ
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    # # Thêm dòng này để lọc nhiễu đứng yên
    # stamped_vel: false
    # predict_to_current_time: true

    # # QUAN TRỌNG: Tăng giá trị này lên để EKF không tin vào nhiễu nhỏ
    # dynamic_process_noise_covariance: true
    # 1. Cấu hình lấy dữ liệu từ BÁNH XE (Chỉ tin tưởng Vận tốc tịnh tiến và Vận tốc xoay)
    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    # Cấu hình lấy dữ liệu từ IMU (Tuyệt đối tin tưởng Góc xoay Yaw (Yaw) và Gia tốc)
    imu0: /imu/data
    imu0_config: [false, false, false, # [X, Y, Z] 
                  false, false, true,  # [Roll, Pitch, Yaw] -> Bật TRUE ở Yaw
                  false, false, false, # [Vx, Vy, Vz]
                  false, false, false, # [Vroll, Vpitch, Vyaw]
                  true,  false, false] # [Ax, Ay, Az] -> (Hoặc bạn có thể thêm Ax, Ay nếu IMU xịn)